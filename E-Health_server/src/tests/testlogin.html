<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Health Token Generator</title>
    <style>
        :root {
            --primary: #0d6efd;
            --danger: #dc3545;
            --success: #198754;
            --warning: #ffc107;
            --bg: #f0f2f5;
            --text: #212529;
            --gray: #6c757d;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--primary);
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #495057;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: #0b5ed7;
            transform: translateY(-1px);
        }

        button:disabled {
            background: #a5c3f7;
            cursor: not-allowed;
            transform: none;
        }

        button.danger {
            background: var(--danger);
        }

        button.danger:hover {
            background: #bb2d3b;
        }

        button.warning {
            background: var(--warning);
            color: #000;
        }

        button.warning:hover {
            background: #ffca2c;
        }

        button.outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            margin-top: 0;
            padding: 5px 10px;
            width: auto;
            font-size: 0.85rem;
        }

        button.outline:hover {
            background: rgba(13, 110, 253, 0.1);
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 5px;
            text-align: center;
            min-height: 24px;
            padding: 5px;
            background: rgba(220, 53, 69, 0.1);
            border-radius: 4px;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            border-left: 4px solid var(--success);
        }

        .avatar {
            width: 50px;
            height: 50px;
            background: #e9ecef;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
            flex-shrink: 0;
        }

        .user-details h4 {
            margin: 0;
            font-size: 1.1rem;
        }

        .user-details p {
            margin: 2px 0 0;
            color: var(--gray);
            font-size: 0.9rem;
        }

        .token-container {
            background: #f8f9fa;
            border: 1px solid #ced4da;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .token-container label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--primary);
        }

        textarea.token-display {
            width: 100%;
            font-family: monospace;
            font-size: 0.75rem;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            background: #fff;
            resize: vertical;
            margin-bottom: 10px;
            color: #d63384;
            word-break: break-all;
        }

        .action-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="loginView" class="card">
            <h2>Lấy Access Token</h2>
            <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
                <div class="form-group">
                    <label>Email hoặc Số điện thoại</label>
                    <input type="text" id="identifier" placeholder="Nhập email/phone" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required
                        autocomplete="current-password">
                </div>
                <div id="loginError" class="error-msg"></div>
                <button type="submit" id="btnLogin">Đăng Nhập</button>
            </form>

            <div style="margin-top: 30px; border-top: 1px dashed #ccc; padding-top: 15px;">
                <label style="font-size: 0.8rem; color: #666;">Mở khóa tài khoản (Admin):</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="unlockAccountId" placeholder="Nhập email" style="font-size: 0.85rem;">
                    <button type="button" onclick="handleUnlock()" class="outline"
                        style="width: auto; margin-top: 0;">Mở Khóa</button>
                </div>
            </div>
        </div>

        <div id="dashboardView" class="card hidden">
            <div class="profile-header">
                <div class="avatar">👤</div>
                <div class="user-details">
                    <h4 id="userName">User Name</h4>
                    <p id="userRole">Role</p>
                    <p id="userEmail" style="font-size: 0.8rem;">email@example.com</p>
                </div>
            </div>

            <div class="token-container">
                <label>
                    <span>🔑 Access Token (tự động làm mới):</span>
                    <span id="tokenExpiry" style="font-size: 0.8rem; color: #666;"></span>
                </label>
                <textarea id="displayToken" class="token-display" rows="5" readonly></textarea>

                <div class="action-bar">
                    <button onclick="copyToken()" class="outline">📋 Copy Token</button>
                </div>
            </div>

            <button onclick="handleLogout()" class="danger">Đăng Xuất</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api/auth';

        const loginView = document.getElementById('loginView');
        const dashboardView = document.getElementById('dashboardView');
        const loginError = document.getElementById('loginError');
        const btnLogin = document.getElementById('btnLogin');
        const displayTokenArea = document.getElementById('displayToken');

        let autoRefreshTimer = null;
        const REFRESH_THRESHOLD_MS = 60000; // Refresh 1 phút trước khi hết hạn

        window.onload = function () {
            checkSessionLocal();
        };

        // Decode JWT payload để lấy expiration time
        function decodeJwt(token) {
            try {
                const parts = token.split('.');
                if (parts.length !== 3) return null;
                const payload = JSON.parse(atob(parts[1]));
                return payload;
            } catch (e) {
                return null;
            }
        }

        // Get thời gian hết hạn của token
        function getTokenExpiry(token) {
            const payload = decodeJwt(token);
            if (!payload || !payload.exp) return null;
            return payload.exp * 1000; // Convert to milliseconds
        }

        // Format thời gian hết hạn để hiển thị
        function formatExpiry(expiryMs) {
            if (!expiryMs) return '';
            const now = Date.now();
            const diff = expiryMs - now;
            if (diff <= 0) return 'đã hết hạn';

            const minutes = Math.floor(diff / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);

            if (minutes >= 1) {
                return `hết hạn trong ${minutes} phút`;
            } else {
                return `hết hạn trong ${seconds} giây`;
            }
        }

        // Cập nhật hiển thị thời hạn token
        function updateTokenExpiryDisplay() {
            const authData = getAuthData();
            if (!authData || !authData.accessToken) {
                document.getElementById('tokenExpiry').textContent = '';
                return;
            }
            const expiry = getTokenExpiry(authData.accessToken);
            document.getElementById('tokenExpiry').textContent = formatExpiry(expiry);
        }

        // Kiểm tra và refresh token theo lịch
        function scheduleTokenRefresh() {
            // Clear timer cũ nếu có
            if (autoRefreshTimer) clearTimeout(autoRefreshTimer);

            const authData = getAuthData();
            if (!authData || !authData.accessToken) return;

            const expiry = getTokenExpiry(authData.accessToken);
            if (!expiry) return;

            const now = Date.now();
            const timeUntilRefresh = expiry - now - REFRESH_THRESHOLD_MS;

            console.log('⏱ Token sẽ hết hạn lúc:', new Date(expiry).toLocaleTimeString('vi-VN'));
            console.log('⏱ Sẽ refresh lúc:', new Date(expiry - REFRESH_THRESHOLD_MS).toLocaleTimeString('vi-VN'));

            if (timeUntilRefresh > 0) {
                autoRefreshTimer = setTimeout(() => {
                    console.log('🔄 Tự động làm mới token...');
                    autoRefreshToken();
                }, timeUntilRefresh);
            } else {
                // Token sắp/đã hết hạn, refresh ngay
                console.log('⚠ Token sắp hết hạn, refresh ngay...');
                autoRefreshToken();
            }
        }

        // Refresh token tự động
        async function autoRefreshToken() {
            const authData = getAuthData();
            if (!authData || !authData.refreshToken) {
                console.log('❌ Không có refresh token');
                return;
            }

            try {
                console.log('🔄 Gọi refresh token...');
                const res = await fetch(`${API_BASE}/refresh-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken: authData.refreshToken })
                });

                const result = await res.json();

                if (res.ok && result.success && result.data) {
                    authData.accessToken = result.data.accessToken;
                    if (result.data.refreshToken) {
                        authData.refreshToken = result.data.refreshToken;
                    }
                    localStorage.setItem('ehealth_auth', JSON.stringify(authData));
                    displayTokenArea.value = authData.accessToken;
                    updateTokenExpiryDisplay();
                    console.log('✅ Token làm mới thành công!');

                    // Đặt timer cho lần refresh tiếp theo
                    scheduleTokenRefresh();
                } else {
                    console.error('❌ Refresh token thất bại:', result.message);
                    // Nếu refresh fail, logout
                    if (result.code === 'AUTH_007' || result.message?.includes('hết hạn')) {
                        console.log('⚠ Phiên hết hạn, cần đăng nhập lại');
                        forceLogout();
                    }
                }
            } catch (error) {
                console.error('❌ Lỗi refresh token:', error);
            }
        }

        function checkSessionLocal() {
            const authData = getAuthData();
            if (authData) {
                showDashboard(authData.user, authData.accessToken);
                scheduleTokenRefresh();
            } else {
                showLogin();
            }
        }

        async function handleLogin() {
            const identifier = document.getElementById('identifier').value.trim();
            const password = document.getElementById('password').value;

            hideError();
            btnLogin.innerText = "Đang xử lý...";
            btnLogin.disabled = true;

            const isPhone = /^\d+$/.test(identifier.replace('+', '').replace(/\s/g, ''));
            const endpoint = isPhone ? '/login/phone' : '/login/email';
            const payload = isPhone ? { phone: identifier, password } : { email: identifier, password };

            payload.clientInfo = {
                deviceId: "POSTMAN_TESTER_HTML",
                deviceName: "Web Token Generator",
                userAgent: navigator.userAgent
            };

            try {
                const res = await fetch(API_BASE + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await res.json();
                console.log('Login response:', result);

                if (!res.ok || !result.success) {
                    throw new Error(result.message || "Đăng nhập thất bại");
                }

                const { data } = result;
                localStorage.setItem('ehealth_auth', JSON.stringify({
                    accessToken: data.accessToken,
                    refreshToken: data.refreshToken,
                    user: data.user
                }));

                showDashboard(data.user, data.accessToken);
                scheduleTokenRefresh();

            } catch (error) {
                console.error('Login error:', error);
                showError(error.message);
            } finally {
                btnLogin.innerText = "Đăng Nhập";
                btnLogin.disabled = false;
            }
        }

        async function handleLogout() {
            if (autoRefreshTimer) clearTimeout(autoRefreshTimer);

            const authData = getAuthData();
            if (authData) {
                try {
                    console.log('Logging out...');
                    const res = await fetch(`${API_BASE}/logout`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ refreshToken: authData.refreshToken })
                    });
                    console.log('Logout response:', res.status);
                } catch (e) {
                    console.error('Logout error:', e);
                }
            }
            forceLogout();
        }

        function forceLogout() {
            if (autoRefreshTimer) clearTimeout(autoRefreshTimer);
            localStorage.removeItem('ehealth_auth');
            displayTokenArea.value = '';
            document.getElementById('tokenExpiry').textContent = '';
            showLogin();
        }

        function copyToken() {
            displayTokenArea.select();
            document.execCommand('copy');
            alert("Đã copy Access Token!");
            window.getSelection().removeAllRanges();
        }

        function getAuthData() {
            const data = localStorage.getItem('ehealth_auth');
            return data ? JSON.parse(data) : null;
        }

        function showLogin() {
            loginView.classList.remove('hidden');
            dashboardView.classList.add('hidden');
        }

        function showDashboard(user, token) {
            document.getElementById('userName').innerText = user.name || "Người dùng";
            document.getElementById('userRole').innerText = user.role || "MEMBER";
            document.getElementById('userEmail').innerText = user.email || user.phone || "";
            displayTokenArea.value = token;
            updateTokenExpiryDisplay();

            loginView.classList.add('hidden');
            dashboardView.classList.remove('hidden');
        }

        function showError(msg) {
            loginError.innerText = msg;
            loginError.classList.add('visible');
        }

        function hideError() {
            loginError.classList.remove('visible');
        }

        async function handleUnlock() {
            const email = document.getElementById('unlockAccountId').value.trim();
            if (!email) return alert("Vui lòng nhập email");
            try {
                console.log('Unlock account request with email:', email);
                const res = await fetch(API_BASE + '/unlock-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const result = await res.json();
                console.log('Unlock response:', result);
                alert(result.success ? "✅ " + result.message : "❌ " + result.message);
            } catch (e) {
                console.error('Unlock error:', e);
                alert("Lỗi kết nối");
            }
        }
    </script>

</body>

</html>
